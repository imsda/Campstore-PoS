<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Camp Store POS</title><link rel="stylesheet" href="/styles.css"></head><body><header><div><strong>Camp Store POS</strong><span>Iowa-Missouri Conference</span></div><nav><a href="/">Clerk</a><a href="/admin.html">Admin</a><span id="sync">Loading…</span></nav></header><main class="pos"><section class="panel"><h2>1. Select Camper</h2><input id="camperSearch" placeholder="Type child name…" autofocus><div id="campers" class="results"></div><div id="selected" class="card muted">No camper selected</div></section><section class="panel"><h2>2. Add Items</h2><input id="itemSearch" placeholder="Search items…"><div id="items" class="results grid"></div></section><aside class="panel cart"><h2>3. Cart</h2><div id="cart"></div><div class="totals"><div>Total <b id="total">$0.00</b></div><div>New balance <b id="newBal">—</b></div></div><input id="clerk" placeholder="Clerk name (optional)"><button id="checkout" class="primary">Complete Sale</button><button id="clear">Clear Cart</button><p id="warn"></p></aside></main><script src="/app.js"></script></body></html>
