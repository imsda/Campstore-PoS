<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Camp Store POS Login</title><link rel="stylesheet" href="/styles.css"></head><body class="login-page"><main class="login-wrap"><section class="login-card"><div class="brand-mark">CS</div><h1>Camp Store POS</h1><p>IMSDA Camp Store</p><form id="loginForm"><label>Username<input id="username" autocomplete="username" autofocus required></label><label>Password<input id="password" type="password" autocomplete="current-password" required></label><button class="primary full" type="submit">Sign in</button><p id="loginMsg" class="danger"></p></form></section></main><script>document.getElementById('loginForm').onsubmit=async e=>{e.preventDefault();loginMsg.textContent='';const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:username.value,password:password.value})});const d=await r.json().catch(()=>({}));if(!r.ok){loginMsg.textContent=d.error||'Sign in failed';return}location.href='/'};</script></body></html>
