<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Camp Store POS Stock</title><link rel="stylesheet" href="/styles.css"></head><body><div id="toasts" class="toast-stack" aria-live="polite" aria-atomic="false"></div><header class="topbar"><div><strong>Camp Store POS</strong><span>Stock</span></div><nav id="nav" class="tabs"><span id="userBadge" class="badge">Loading…</span><button id="logout" class="secondary">Logout</button></nav></header><main class="container"><section class="hero-card"><div><p class="eyebrow">Stock</p><h1>Increase item stock</h1><p class="muted">View inventory and add stock. This page can only increase quantities.</p></div></section><section class="panel wide"><div class="toolbar"><input id="stockSearch" placeholder="Search by item, category, or SKU" aria-label="Search stock"><select id="stockStatus" aria-label="Filter status"><option value="">All items</option><option value="active">Active only</option><option value="inactive">Inactive only</option></select></div><div id="stockError" class="message"></div><div class="table-scroll"><table><thead><tr><th>Item</th><th>Category</th><th>SKU</th><th>Current Stock</th><th>Status</th><th>Last Update</th><th>Actions</th></tr></thead><tbody id="stockRows"><tr><td colspan="7" class="muted">Loading…</td></tr></tbody></table></div></section><section class="panel wide"><h2>Recent stock additions</h2><table><thead><tr><th>Date/time</th><th>Item</th><th>Quantity added</th><th>User</th></tr></thead><tbody id="recentRows"></tbody></table></section></main><script src="/datetime.js"></script><script src="/stock.js"></script></body></html>
